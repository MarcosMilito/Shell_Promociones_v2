<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Administración</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-body">

  <main class="admin">

    <section id="loginBox" class="card">
      <h1>Ingresar</h1>

      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Contraseña">

      <button id="btnLogin">Iniciar sesión</button>
    </section>

    <section id="adminBox" class="card hidden">
      <h1 id="tituloEstacion">Panel de promociones</h1>

      <div class="upload-box">
        <h2>Nueva promoción</h2>

        <label>Archivo horizontal 1920 x 1080</label>
        <input type="file" id="archivoHorizontal" accept="image/*,video/*">

        <label>Archivo vertical 1080 x 1920</label>
        <input type="file" id="archivoVertical" accept="image/*,video/*">

        <button id="btnSubir">Guardar promoción</button>
      </div>

      <button id="btnLogout" class="secondary">Cerrar sesión</button>

      <p class="help">
        Formatos recomendados: JPG, PNG, WEBP y MP4. Horizontal: 1920x1080. Vertical: 1080x1920.
      </p>

      <h2>Promociones cargadas</h2>

      <div id="listaPromos"></div>
    </section>

  </main>

  <script type="module" src="admin.js"></script>
</body>
</html>
